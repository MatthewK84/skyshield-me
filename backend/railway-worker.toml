# ─── SkyShield ME — Celery Worker Railway Config ────────────────
# Create a SEPARATE service in Railway for this.
# Set Root Directory to /backend in the Railway dashboard.
# Set Config Path to /backend/railway-worker.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["/backend/**"]

[deploy]
startCommand = "celery -A app.core.celery_app worker --loglevel=info --concurrency=2"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
