# ─── SkyShield ME — Celery Beat Scheduler Railway Config ────────
# Create a SEPARATE service in Railway for this.
# Set Root Directory to /backend in the Railway dashboard.
# Set Config Path to /backend/railway-beat.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["/backend/**"]

[deploy]
startCommand = "celery -A app.core.celery_app beat --loglevel=info"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
